apiVersion: apps/v1
kind: Deployment
metadata:
  name: college-erp-web
  labels:
    app: college-erp
spec:
  replicas: 3
  selector:
    matchLabels:
      app: college-erp
  template:
    metadata:
      labels:
        app: college-erp
    spec:
      containers:
      - name: web
        image: ghcr.io/yourusername/college-erp:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: erp-secrets
              key: database-url
        - name: REDIS_URL
          value: "redis://redis-svc:6379/1"
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: erp-secrets
              key: django-secret-key
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: college-erp-svc
spec:
  selector:
    app: college-erp
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
