upstream web_backend {
    server web:8000;
}

server {
    listen 80;

    # Pass the Host header exactly as received to Django so django-tenants can resolve the tenant
    server_name _; 

    location / {
        proxy_pass http://web_backend;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
    }
}
