{% extends 'main_app/base.html' %}
{% block page_title %}{{ page_title }}{% endblock page_title %}

{% block content %}
<section class="content">
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-8 mx-auto">
                <div class="card card-primary">
                    <div class="card-header">
                        <h3 class="card-title">Exam Details</h3>
                    </div>
                    <form method="POST" action="{% url 'staff_create_exam' %}">
                        {% csrf_field %}
                        <div class="card-body">
                            <div class="form-group">
                                <label for="title">Exam Title</label>
                                <input type="text" class="form-control" name="title" id="title" placeholder="e.g. Midterm Physics" required>
                            </div>
                            <div class="form-group">
                                <label>Subject</label>
                                <select name="subject" class="form-control" required>
                                    <option value="">--- Select Subject ---</option>
                                    {% for sub in subjects %}
                                        <option value="{{ sub.id }}">{{ sub.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="duration">Duration (in minutes)</label>
                                <input type="number" class="form-control" name="duration" id="duration" value="30" required>
                            </div>
                        </div>
                        <div class="card-footer">
                            <button type="submit" class="btn btn-primary btn-block">Create Exam</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock content %}
