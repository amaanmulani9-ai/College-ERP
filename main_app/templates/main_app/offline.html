<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline | Patkar College ERP</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f6f9;
            color: #333;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            font-size: 2.5rem;
            color: #1e3a8a;
        }
        p {
            font-size: 1.2rem;
            color: #6c757d;
        }
        .icon {
            font-size: 4rem;
            color: #6c757d;
            margin-bottom: 20px;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #1e3a8a;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="icon">📡</div>
    <h1>You are offline</h1>
    <p>Please check your internet connection and try again.</p>
    <a href="/" class="btn">Retry Connection</a>
</body>
</html>
