name: college_erp_mobile
description: College ERP Mobile Application - Version 5.0

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management & Network
  provider: ^6.0.5
  http: ^1.1.0
  
  # Firebase for Push Notifications
  firebase_core: ^2.17.0
  firebase_messaging: ^14.6.9
  
  # Offline Caching
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # QR Scanner (Attendance, Visitors, Library)
  mobile_scanner: ^3.4.1
  
  # Live Virtual Classes (Jitsi Meet)
  jitsi_meet_wrapper: ^0.0.6
  
  # UI & Utilities
  cupertino_icons: ^1.0.2
  shared_preferences: ^2.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
