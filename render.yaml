databases:
  - name: college-erp-db
    databaseName: college_erp
    plan: free

services:
  - type: web
    name: college-erp-web
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python backend/manage.py collectstatic --noinput && python backend/manage.py migrate_schemas && python setup_tenants.py && python create_default_admin.py"
    startCommand: "gunicorn college_management_system.wsgi:application --bind 0.0.0.0:$PORT --chdir backend"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: college-erp-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: college-erp-redis
          property: connectionString
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: TINYMCE_API_KEY
        value: "jjfi2acmd8qgfrdcr92rvhgd1g5e2rp7ou8ocgsfc77qbt7x"
      - key: TINYMCE_PRIVATE_KEY
        value: "a0b7db0fd0bd5fe92a2335af8aff5e286fd673b0ebb1aa3242de02cc0cb32b89"


  - type: redis
    name: college-erp-redis
    ipAllowList: [] # only allow internal connections
    plan: free
