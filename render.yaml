databases:
  - name: college-erp-db
    databaseName: college_erp
    user: postgres
    plan: free

services:
  - type: web
    name: college-erp-web
    env: python
    plan: free
    buildCommand: "pip install -r backend/requirements.txt && python backend/manage.py collectstatic --noinput && python backend/manage.py migrate"
    startCommand: "gunicorn college_management_system.wsgi:application --bind 0.0.0.0:$PORT --chdir backend"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: college-erp-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: college-erp-redis
          property: connectionString
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: RENDER_EXTERNAL_HOSTNAME
        sync: false

  - type: worker
    name: college-erp-celery
    env: python
    plan: free
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "celery -A college_management_system worker -l info --workdir backend"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: college-erp-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: college-erp-redis
          property: connectionString

  - type: redis
    name: college-erp-redis
    ipAllowList: [] # only allow internal connections
    plan: free
