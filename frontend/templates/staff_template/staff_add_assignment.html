{% extends 'main_app/base.html' %}
{% load static %}
{% block page_title %}{{ page_title }}{% endblock page_title %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card erpnext-card">
                <div class="card-header">
                    <h5 class="card-title mb-0"><i class="fas fa-tasks text-success"></i> Publish New Assignment</h5>
                </div>
                <div class="card-body">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Assignment Title <span class="text-danger">*</span></label>
                            <input type="text" name="title" class="form-control" required placeholder="e.g. Weekly Coding Challenge #3">
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Subject <span class="text-danger">*</span></label>
                                <select name="subject" class="form-select" required>
                                    <option value="">Select Subject</option>
                                    {% for sub in subjects %}
                                    <option value="{{ sub.id }}">{{ sub.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Due Date & Time <span class="text-danger">*</span></label>
                                <input type="datetime-local" name="due_date" class="form-control" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Attachment File (Optional)</label>
                            <input type="file" name="attachment" class="form-control">
                            <small class="text-muted">Attach PDF instructions, starter code, or reference docs.</small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Instructions / Description <span class="text-danger">*</span></label>
                            <textarea name="description" class="form-control" rows="6" required placeholder="Detail the assignment requirements, grading rubric, and submission instructions..."></textarea>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{% url 'staff_lms_home' %}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-success"><i class="fas fa-check"></i> Publish Assignment</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
