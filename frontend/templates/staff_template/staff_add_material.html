{% extends 'main_app/base.html' %}
{% load static %}
{% block page_title %}{{ page_title }}{% endblock page_title %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card erpnext-card">
                <div class="card-header">
                    <h5 class="card-title mb-0"><i class="fas fa-file-upload text-info"></i> Upload Study Material & Notes</h5>
                </div>
                <div class="card-body">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Material Title <span class="text-danger">*</span></label>
                            <input type="text" name="title" class="form-control" required placeholder="e.g. Chapter 4 Lecture Notes (PDF)">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Subject <span class="text-danger">*</span></label>
                            <select name="subject" class="form-select" required>
                                <option value="">Select Subject</option>
                                {% for sub in subjects %}
                                <option value="{{ sub.id }}">{{ sub.name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">File (PDF / DOCX / ZIP) <span class="text-danger">*</span></label>
                            <input type="file" name="file" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Description / Summary</label>
                            <textarea name="description" class="form-control" rows="4" placeholder="Briefly describe what this document contains..."></textarea>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{% url 'staff_lms_home' %}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-info text-white"><i class="fas fa-upload"></i> Upload Material</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
