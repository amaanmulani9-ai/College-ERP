{% extends 'main_app/base.html' %}
{% load static %}
{% block page_title %}{{ page_title }}{% endblock page_title %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card erpnext-card">
                <div class="card-header">
                    <h5 class="card-title mb-0"><i class="fas fa-calendar-plus text-primary"></i> Schedule Live Class</h5>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Class Title <span class="text-danger">*</span></label>
                            <input type="text" name="title" class="form-control" required placeholder="e.g. Introduction to Neural Networks">
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Subject <span class="text-danger">*</span></label>
                                <select name="subject" class="form-select" required>
                                    <option value="">Select Subject</option>
                                    {% for sub in subjects %}
                                    <option value="{{ sub.id }}">{{ sub.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Duration (Minutes) <span class="text-danger">*</span></label>
                                <input type="number" name="duration_minutes" class="form-control" required value="60" min="15" max="300">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Scheduled At (Date & Time) <span class="text-danger">*</span></label>
                            <input type="datetime-local" name="scheduled_at" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Class Description</label>
                            <textarea name="description" class="form-control" rows="4" placeholder="Outline the topics to be covered or link to files..."></textarea>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{% url 'staff_live_classes' %}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Schedule Class</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
