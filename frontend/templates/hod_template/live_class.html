{% extends 'main_app/base.html' %}
{% load static %}
{% block page_title %}{{ page_title }}{% endblock page_title %}

{% block custom_css %}
<style>
    body { background-color: #f4f6f9; font-family: 'Poppins', sans-serif; }
    
    .live-class-container {
        display: flex;
        gap: 30px;
        margin-top: 20px;
    }

    /* Left Panel: Host Meeting */
    .host-panel {
        flex: 1;
        max-width: 500px;
        background: #fff;
        border-radius: 12px;
        padding: 30px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    .btn-host {
        background: #ff7675;
        color: #fff;
        border: none;
        padding: 10px 25px;
        border-radius: 25px;
        font-weight: 600;
        font-size: 15px;
        margin-bottom: 30px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }
    
    .form-group-rounded {
        width: 100%;
        margin-bottom: 20px;
        position: relative;
    }
    .form-group-rounded label {
        position: absolute;
        top: -10px;
        left: 20px;
        background: #6c5ce7;
        color: #fff;
        padding: 2px 10px;
        border-radius: 15px;
        font-size: 11px;
        font-weight: 600;
        z-index: 1;
    }
    .form-control-rounded {
        width: 100%;
        border-radius: 25px;
        border: 1px solid #6c5ce7;
        padding: 12px 20px;
        font-size: 14px;
        color: #2c3e50;
        background: transparent;
    }
    .form-control-rounded:focus {
        outline: none;
        box-shadow: 0 0 0 0.2rem rgba(108, 92, 231, 0.1);
    }
    
    .msg-area {
        width: 100%;
        margin-bottom: 20px;
    }
    .msg-area label {
        font-size: 13px;
        color: #2c3e50;
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
    }
    .form-control-area {
        width: 100%;
        border-radius: 12px;
        border: 1px solid #dfe6e9;
        padding: 15px;
        font-size: 14px;
        resize: none;
    }
    .char-count {
        text-align: right;
        font-size: 10px;
        color: #b2bec3;
        margin-top: 5px;
        text-transform: uppercase;
    }

    .btn-create-join {
        background: #ff7675;
        color: #fff;
        border: none;
        padding: 12px 30px;
        border-radius: 25px;
        font-weight: 600;
        font-size: 14px;
    }

    /* Right Panel: Display */
    .display-panel {
        flex: 2;
        display: flex;
        flex-direction: column;
    }
    .header-banner {
        background: linear-gradient(135deg, #4834d4, #686de0);
        border-radius: 16px;
        padding: 30px;
        color: #fff;
        text-align: center;
        position: relative;
        overflow: hidden;
        margin-bottom: 25px;
    }
    .header-banner h1 {
        font-size: 32px;
        font-weight: 700;
        margin: 0 0 5px 0;
    }
    .header-banner p {
        font-size: 14px;
        margin: 0 0 15px 0;
        opacity: 0.9;
    }
    .btn-desktop {
        background: transparent;
        border: 1px solid rgba(255,255,255,0.5);
        color: #fff;
        padding: 5px 15px;
        border-radius: 15px;
        font-size: 11px;
    }

    .tabs-pill {
        display: flex;
        gap: 15px;
        margin-bottom: 30px;
    }
    .tab-pill {
        padding: 8px 20px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 600;
        color: #2c3e50;
        background: transparent;
        border: none;
        cursor: pointer;
    }
    .tab-pill.active {
        background: #6c5ce7;
        color: #fff;
    }

    .empty-state {
        text-align: center;
        margin-top: 50px;
    }
    .empty-state img {
        width: 300px;
        max-width: 100%;
        margin-bottom: 20px;
    }
    .empty-state p {
        color: #7f8fa6;
        font-weight: 600;
        font-size: 16px;
    }

</style>
{% endblock custom_css %}

{% block content %}
<section class="content">
    <div class="container-fluid">
        <div class="live-class-container">
            
            <div class="host-panel">
                <button class="btn-host"><i class="fas fa-video"></i> Host Meeting</button>
                
                <div class="form-group-rounded">
                    <label>Meeting Title*</label>
                    <input type="text" class="form-control-rounded" value="Meeting title">
                </div>
                
                <div class="form-group-rounded">
                    <label>Meeting ID*</label>
                    <input type="text" class="form-control-rounded" value="ESK19803zaSG7kL">
                </div>
                
                <div class="form-group-rounded">
                    <label>Meeting With*</label>
                    <select class="form-control-rounded">
                        <option>All Students</option>
                    </select>
                </div>

                <div class="msg-area">
                    <label><input type="checkbox"> I want to schedule this meeting.</label>
                    <textarea class="form-control-area" rows="4" placeholder="Write your Message here, if any.."></textarea>
                    <div class="char-count">MAX 244 Character</div>
                </div>

                <button class="btn-create-join"><i class="fas fa-plus"></i> Create & Join</button>
            </div>

            <div class="display-panel">
                <div class="header-banner">
                    <h1>02:48 AM</h1>
                    <p>Wednesday, Jul 08, 2026</p>
                    <button class="btn-desktop"><i class="fas fa-desktop"></i> Go Unlimited with eSkooly Desktop</button>
                </div>

                <div class="tabs-pill">
                    <button class="tab-pill active">All Meetings</button>
                    <button class="tab-pill">Today</button>
                    <button class="tab-pill">Tomorrow</button>
                    <button class="tab-pill">Self Hosted</button>
                    <button class="tab-pill">Invitations</button>
                </div>

                <div class="empty-state">
                    <!-- Placeholder for illustration -->
                    <div style="font-size:100px; color:#dfe6e9; margin-bottom:20px;"><i class="fas fa-users-class"></i></div>
                    <p>No meeting found.</p>
                </div>
            </div>
            
        </div>
    </div>
</section>
{% endblock content %}
