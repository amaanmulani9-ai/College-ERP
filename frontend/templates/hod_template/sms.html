{% extends 'main_app/base.html' %}
{% load static %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <div class="card">
            <div class="card-header bg-info text-white">
                <h3 class="card-title"><i class="fas fa-sms"></i> SMS Services</h3>
            </div>
            <div class="card-body">
                <form action="{% url 'admin_sms' %}" method="POST">
                    {% csrf_token %}
                    
                    <div class="form-group">
                        <label for="group">Select Recipient Group</label>
                        <select id="group" class="form-control" name="group" required title="Recipient Group">
                            <option value="">-- Select --</option>
                            <option value="all_students">All Students</option>
                            <option value="all_parents">All Parents</option>
                            <option value="all_staff">All Staff</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Message Content (Max 160 characters)</label>
                        <textarea class="form-control" name="message" rows="3" maxlength="160" required placeholder="Type your SMS here..."></textarea>
                    </div>

                    <button type="submit" class="btn btn-info"><i class="fas fa-paper-plane"></i> Send SMS</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
