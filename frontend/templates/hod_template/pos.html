{% extends 'main_app/base.html' %}
{% load static %}

{% block content %}
<div class="row">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-secondary text-white">
                <h3 class="card-title"><i class="fas fa-shopping-cart"></i> Point of Sale</h3>
            </div>
            <div class="card-body">
                <div class="input-group mb-3">
                    <input type="text" id="pos-search" class="form-control" placeholder="Search Item by Name...">
                    <div class="input-group-append">
                        <button class="btn btn-outline-secondary" type="button" id="pos-search-btn"><i class="fas fa-search"></i> Search</button>
                    </div>
                </div>
                
                <div id="search-results" class="list-group mb-4" style="max-height: 200px; overflow-y: auto;">
                    <!-- Search results populated here -->
                </div>

                <hr>
                <h5>Cart Items</h5>
                <table class="table table-sm">
                    <thead>
                        <tr>
                            <th>Item</th>
                            <th>Price</th>
                            <th>Qty</th>
                            <th>Total</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="cart-items">
                        <tr>
                            <td colspan="5" class="text-center text-muted" id="empty-cart-msg">No items added to cart</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <div class="col-md-4">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h3 class="card-title">Order Summary</h3>
            </div>
            <div class="card-body">
                <p class="d-flex justify-content-between"><span>Subtotal:</span> <strong id="summary-subtotal">$0.00</strong></p>
                <p class="d-flex justify-content-between"><span>Tax (10%):</span> <strong id="summary-tax">$0.00</strong></p>
                <hr>
                <h4 class="d-flex justify-content-between text-success"><span>Total:</span> <strong id="summary-total">$0.00</strong></h4>
                
                <button id="checkout-btn" class="btn btn-success btn-lg btn-block mt-4" disabled>Proceed to Checkout</button>
            </div>
        </div>
    </div>
</div>

<script>
    let cart = [];
    const taxRate = 0.10;

    document.getElementById('pos-search-btn').addEventListener('click', searchProducts);
    document.getElementById('pos-search').addEventListener('keyup', function(e) {
        if(e.key === 'Enter') searchProducts();
    });

    function searchProducts() {
        const query = document.getElementById('pos-search').value;
        fetch(`{% url 'admin_pos_search' %}?q=${query}`)
            .then(res => res.json())
            .then(data => {
                const resultsContainer = document.getElementById('search-results');
                resultsContainer.innerHTML = '';
                if(data.results.length === 0) {
                    resultsContainer.innerHTML = '<div class="list-group-item text-muted">No products found.</div>';
                    return;
                }
                data.results.forEach(p => {
                    const btn = document.createElement('button');
                    btn.className = 'list-group-item list-group-item-action d-flex justify-content-between align-items-center';
                    btn.innerHTML = `${p.name} <span class="badge badge-primary badge-pill">$${p.price.toFixed(2)}</span>`;
                    btn.onclick = () => addToCart(p);
                    if(p.stock <= 0) {
                        btn.disabled = true;
                        btn.innerHTML += ' <span class="text-danger ml-2">(Out of Stock)</span>';
                    }
                    resultsContainer.appendChild(btn);
                });
            });
    }

    function addToCart(product) {
        const existing = cart.find(i => i.id === product.id);
        if(existing) {
            if(existing.quantity < product.stock) {
                existing.quantity++;
            } else {
                alert("Cannot exceed available stock.");
            }
        } else {
            cart.push({...product, quantity: 1});
        }
        renderCart();
    }

    function removeFromCart(productId) {
        cart = cart.filter(i => i.id !== productId);
        renderCart();
    }

    function renderCart() {
        const tbody = document.getElementById('cart-items');
        tbody.innerHTML = '';
        if(cart.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted" id="empty-cart-msg">No items added to cart</td></tr>';
            document.getElementById('checkout-btn').disabled = true;
            updateSummary(0, 0, 0);
            return;
        }

        let subtotal = 0;
        cart.forEach(item => {
            const itemTotal = item.price * item.quantity;
            subtotal += itemTotal;
            
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${item.name}</td>
                <td>$${item.price.toFixed(2)}</td>
                <td>${item.quantity}</td>
                <td>$${itemTotal.toFixed(2)}</td>
                <td><button class="btn btn-sm btn-danger" onclick="removeFromCart(${item.id})"><i class="fas fa-times"></i></button></td>
            `;
            tbody.appendChild(tr);
        });

        const tax = subtotal * taxRate;
        const total = subtotal + tax;
        updateSummary(subtotal, tax, total);
        document.getElementById('checkout-btn').disabled = false;
    }

    function updateSummary(subtotal, tax, total) {
        document.getElementById('summary-subtotal').innerText = `$${subtotal.toFixed(2)}`;
        document.getElementById('summary-tax').innerText = `$${tax.toFixed(2)}`;
        document.getElementById('summary-total').innerText = `$${total.toFixed(2)}`;
    }

    document.getElementById('checkout-btn').addEventListener('click', function() {
        const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        const tax = subtotal * taxRate;
        const total = subtotal + tax;

        fetch("{% url 'admin_pos' %}", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": "{{ csrf_token }}"
            },
            body: JSON.stringify({
                items: cart,
                total: total,
                tax: tax
            })
        })
        .then(res => res.json())
        .then(data => {
            if(data.status === 'success') {
                alert(`Checkout successful! Order #${data.order_id}`);
                cart = [];
                renderCart();
            } else {
                alert("Error during checkout: " + data.message);
            }
        });
    });
</script>
{% endblock content %}
