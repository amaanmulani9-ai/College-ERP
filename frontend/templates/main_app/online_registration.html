{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>CAMPUS PRO ERP - Online Registration</title>

    <!-- Favicon -->
    <link rel="shortcut icon" href="{% static '/image/favicon1.ico' %}">

    <!-- ERPNext Style CSS -->
    <link rel="stylesheet" href="{% static 'dist/css/erpnext-style.css' %}">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="{% static 'plugins/fontawesome-free/css/all.min.css' %}">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root{
            --bg:#090a0f;
            --panel:rgba(255,255,255,.04);
            --panel-strong:rgba(255,255,255,.08);
            --line:rgba(255,255,255,.08);
            --text:#f8fafc;
            --muted:rgba(244,247,251,.72);
            --brand:#6366f1;
            --brand2:#a855f7;
            --accent:#06b6d4;
        }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Outfit', sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.16), transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.18), transparent 40%),
                linear-gradient(135deg, #090a0f, #12131a 50%, #090a0f);
        }
        .register-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 0 20px;
        }
        .register-card {
            background: rgba(20, 22, 32, 0.65);
            color: #e2e8f0;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 28px 80px rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        .form-control, .form-select {
            height: 46px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
            color: #fff;
            outline: none;
            transition: all 0.2s ease;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.25);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }
        .form-select option {
            background: #12131a;
            color: #fff;
        }
        .form-control::placeholder {
            color: #475569;
        }
        .btn-primary {
            height: 48px;
            border: 0;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, var(--brand), var(--brand2));
            box-shadow: 0 16px 30px rgba(99, 102, 241, 0.22);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 36px rgba(99, 102, 241, 0.32);
            background: linear-gradient(135deg, var(--brand), var(--brand2));
            color: #fff;
        }
        .btn-link {
            color: var(--brand);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }
        .btn-link:hover {
            color: #818cf8;
            text-decoration: underline;
        }
        .register-card h1 {
            background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }
    </style>
</head>

<body>
    <div class="container register-container">
        <div class="register-card">
            <div class="text-center mb-4">
                <h1 class="h3">Online Registration</h1>
                <p class="text-muted">Register as a Student</p>
            </div>

            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %} text-center">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}

            <form action="{% url 'online_registration' %}" method="post">
                {% csrf_token %}

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">First Name</label>
                        <input type="text" name="first_name" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Last Name</label>
                        <input type="text" name="last_name" class="form-control" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Gender</label>
                    <select name="gender" class="form-select" required>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email / Gmail</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Course</label>
                    <select name="course_id" class="form-select" required>
                        {% for course in courses %}
                        <option value="{{ course.id }}">{{ course.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Course Year / Session</label>
                    <select name="session_id" class="form-select" required>
                        {% for session in sessions %}
                        <option value="{{ session.id }}">{{ session.start_year }} to {{ session.end_year }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label">Registration Fees</label>
                    <input type="text" class="form-control" value="0" readonly>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary">Register</button>
                    <a href="{% url 'login_page' %}" class="btn btn-link text-center">Back to Login</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
