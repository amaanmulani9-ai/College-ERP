{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>CAMPUS PRO ERP - Password Reset</title>

    <!-- Favicon -->
    <link rel="shortcut icon" href="{% static '/image/favicon1.ico' %}">

    <!-- ERPNext Style CSS -->
    <link rel="stylesheet" href="{% static 'dist/css/erpnext-style.css' %}">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="{% static 'plugins/fontawesome-free/css/all.min.css' %}">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root{
            --bg:#090a0f;
            --panel:rgba(255,255,255,.04);
            --text:#f8fafc;
            --brand:#6366f1;
            --brand2:#a855f7;
        }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Outfit', sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.16), transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.18), transparent 40%),
                linear-gradient(135deg, #090a0f, #12131a 50%, #090a0f);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            width: min(100%, 460px);
            margin: auto;
        }
        .login-card {
            background: rgba(20, 22, 32, 0.65);
            color: #e2e8f0;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 28px 80px rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .login-logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .login-title {
            background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            margin-top: 10px;
            margin-bottom: 4px;
        }
        .login-subtitle {
            color: #94a3b8;
            font-size: 13px;
            margin: 0;
        }
        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        .form-control {
            height: 46px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            background: rgba(255, 255, 255, 0.03) !important;
            color: #fff !important;
            outline: none;
            transition: all 0.2s ease;
        }
        .form-control:focus {
            border-color: var(--brand) !important;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.25) !important;
            background: rgba(255, 255, 255, 0.05) !important;
            color: #fff !important;
        }
        .btn-primary {
            height: 48px;
            border: 0;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, var(--brand), var(--brand2)) !important;
            box-shadow: 0 16px 30px rgba(99, 102, 241, 0.22);
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 36px rgba(99, 102, 241, 0.32);
            background: linear-gradient(135deg, var(--brand), var(--brand2)) !important;
            color: #fff;
        }
        .btn-link {
            color: var(--brand);
            text-decoration: none;
            font-weight: 600;
        }
        .btn-link:hover {
            color: #818cf8;
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <img src="{% static 'image/logo.png' %}" alt="Logo" style="height: 60px;">
                <h1 class="login-title" style="font-size: 18px; font-weight: bold;">CAMPUS PRO ERP</h1>
                <p class="login-subtitle">Education Management System</p>
            </div>

            {% block content %}{% endblock %}

            <!-- Footer -->
            <div class="login-footer text-center mt-4">
                <small class="text-muted">
                    &copy; 2026 CAMPUS PRO ERP. All rights reserved.
                </small>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'plugins/jquery/jquery.min.js' %}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Add 'form-control' class to form inputs for consistent styling
            var formInputs = document.querySelectorAll('form input[type="text"], form input[type="email"], form input[type="password"]');
            formInputs.forEach(function (input) {
                input.classList.add('form-control');
            });
        });
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const passwordInputs = document.querySelectorAll('input[type="password"]');
            passwordInputs.forEach(input => {
                // Create wrapper
                const wrapper = document.createElement('div');
                wrapper.style.position = 'relative';
                wrapper.style.display = 'flex';
                wrapper.style.alignItems = 'center';
                
                input.parentNode.insertBefore(wrapper, input);
                wrapper.appendChild(input);
                
                // Create icon
                const icon = document.createElement('i');
                icon.className = 'fas fa-eye';
                icon.style.position = 'absolute';
                icon.style.right = '10px';
                icon.style.cursor = 'pointer';
                icon.style.color = '#888';
                icon.style.zIndex = '10';
                
                icon.addEventListener('click', function() {
                    if (input.type === 'password') {
                        input.type = 'text';
                        icon.className = 'fas fa-eye-slash';
                    } else {
                        input.type = 'password';
                        icon.className = 'fas fa-eye';
                    }
                });
                
                wrapper.appendChild(icon);
            });
        });
    </script>
</body>

</html>
